<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>14AØ — Event Horizon</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
  }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #stage {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    background:
      radial-gradient(120% 120% at 50% 50%,
        #060912 0%,
        #03050c 38%,
        #010205 66%,
        #000000 100%);
  }
  #stage::after {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(40% 38% at 50% 50%, rgba(40,80,180,0.10), rgba(0,0,0,0) 70%),
      radial-gradient(70% 60% at 64% 36%, rgba(20,40,110,0.06), rgba(0,0,0,0) 72%);
    pointer-events: none;
  }
  canvas { position: fixed; inset: 0; display: block; }
  #back { z-index: 1; }
  #main { z-index: 2; }

  .ui { position: fixed; z-index: 3; pointer-events: none; color: #cfe0ff; }
  .brand {
    top: clamp(18px, 3.2vh, 40px); left: clamp(18px, 3vw, 46px);
    font-weight: 600;
    font-size: clamp(15px, 1.5vw, 20px);
    letter-spacing: 0.42em;
    opacity: 0.82;
    text-shadow: 0 0 18px rgba(90,150,255,0.45);
  }
  .tag {
    bottom: clamp(20px, 4vh, 52px); left: 0; right: 0;
    text-align: center;
    font-size: clamp(9px, 0.92vw, 12px);
    letter-spacing: 0.62em;
    text-indent: 0.62em;
    color: #7f97c8;
    opacity: 0.62;
    font-weight: 500;
  }
  #fallback {
    display: none;
    position: fixed; z-index: 2; inset: 0;
  }
  #fallback .ring {
    position: absolute; left: 50%; top: 50%;
    width: 38vmin; height: 38vmin; transform: translate(-50%,-50%);
    border-radius: 50%;
    border: 2px solid rgba(210,228,255,0.9);
    box-shadow: 0 0 60px 8px rgba(70,140,255,0.5), inset 0 0 50px 6px rgba(70,140,255,0.35);
  }
  #fallback .slash {
    position: absolute; left: 50%; top: 50%;
    width: 46vmin; height: 2.4px; transform: translate(-50%,-50%) rotate(-45deg);
    background: linear-gradient(90deg, rgba(120,170,255,0) 0%, rgba(235,243,255,0.95) 50%, rgba(120,170,255,0) 100%);
    box-shadow: 0 0 24px 2px rgba(120,170,255,0.7);
  }
  @media (prefers-reduced-motion: reduce) {
    #stage::after { opacity: 0.7; }
  }
</style>
</head>
<body>
  <div id="stage"></div>
  <canvas id="back"></canvas>
  <canvas id="main"></canvas>
  <div id="fallback"><div class="ring"></div><div class="slash"></div></div>
  <div class="ui brand">14AØ</div>
  <div class="ui tag">ARTIFICIAL&nbsp;&nbsp;INTELLIGENCE · ROBOTICS</div>

<script>
(function () {
  "use strict";

  var TAU = Math.PI * 2;

  // requestAnimationFrame shim (defensive; modern browsers already have it)
  var raf = window.requestAnimationFrame ||
            function (cb) { return window.setTimeout(function () { cb(now()); }, 16); };
  var caf = window.cancelAnimationFrame || window.clearTimeout;
  function now() { return (window.performance && performance.now) ? performance.now() : Date.now(); }

  var mq = window.matchMedia ? window.matchMedia("(prefers-reduced-motion: reduce)") : null;
  var REDUCE = !!(mq && mq.matches);
  function clampDpr() { return Math.min(Math.max(window.devicePixelRatio || 1, 1), 2); } // cap at 2
  var DPR = clampDpr();

  var back = document.getElementById("back");
  var main = document.getElementById("main");
  var fallbackEl = document.getElementById("fallback");
  var bctx, mctx;
  var dead = false;

  // Graceful, permanent fall back to the static CSS Ø on any unrecoverable error,
  // so the hero is never left blank, frozen or half-drawn.
  function failToFallback(err) {
    if (dead) return;
    dead = true;
    try { stop(); } catch (e) {}
    try {
      if (back) back.style.display = "none";
      if (main) main.style.display = "none";
      if (fallbackEl) fallbackEl.style.display = "block";
    } catch (e) {}
    if (window.console && console.error) console.error("[14AO] hero fell back to static glyph:", err);
  }

  try {
    bctx = back.getContext("2d");
    mctx = main.getContext("2d");
    if (!bctx || !mctx) throw new Error("2d context unavailable");
  } catch (err) {
    failToFallback(err);
    return;
  }

  var W = 0, H = 0, CX = 0, CY = 0, R = 0, Lj = 0, SH = 0, RIM = 0;
  var AX = Math.cos(-Math.PI / 4), AY = Math.sin(-Math.PI / 4); // upper-right
  var PX = -AY, PY = AX;                                        // perpendicular

  var gBloom = null, gShadow = null, gDiag = null, gDisc = null, gHot = null;

  var ACC_N = 2400, JET_N = 1100, STAR_N = 600;
  var acc = [], jet = [], stars = [];
  // adaptive caps: the governor lowers these on slow hardware (never above array length)
  var accCap = 0, jetCap = 0, starCap = 0;

  var ACC_COL = ["rgb(214,226,247)", "rgb(190,209,240)", "rgb(150,186,255)", "rgb(96,156,255)", "rgb(58,120,250)", "rgb(236,244,255)"];
  var JET_COL = ["rgb(238,245,255)", "rgb(198,219,255)", "rgb(140,182,255)", "rgb(96,156,255)", "rgb(60,124,250)"];
  var STAR_COL = ["rgb(255,255,255)", "rgb(214,228,255)", "rgb(184,204,255)", "rgb(255,250,242)"];

  function rnd(a, b) { return a + Math.random() * (b - a); }
  function gauss() { return (Math.random() + Math.random() + Math.random() - 1.5) / 1.5; }
  function biasPick(arr, p) { var i = (Math.pow(Math.random(), p) * arr.length) | 0; return arr[i < arr.length ? i : arr.length - 1]; }
  function clamp01(v) { if (!isFinite(v) || v < 0) return 0; if (v > 1) return 1; return v; }

  function spawnAcc(p, seed) {
    p.a = Math.random() * TAU;
    var r = R * (1.0 + gauss() * 0.42);
    if (r < R * 0.36) r = R * 0.36;
    if (r > R * 1.85) r = R * 1.85;
    p.r = seed ? rnd(R * 0.4, R * 1.7) : r;
    p.size = rnd(0.6, 1.9);
    p.base = rnd(0.10, 0.32);
    p.col = biasPick(ACC_COL, 1.7);
    p.x = CX + Math.cos(p.a) * p.r;
    p.y = CY + Math.sin(p.a) * p.r;
    p.px = p.x; p.py = p.y;
  }

  function spawnJet(p, seed) {
    p.dir = Math.random() < 0.5 ? 1 : -1;
    p.t = seed ? p.dir * Math.random() : p.dir * rnd(0.0, 0.06);
    p.spd = rnd(0.32, 0.62);
    p.wob = rnd(0, TAU);
    p.size = rnd(0.7, 2.1);
    p.base = rnd(0.14, 0.42);
    p.col = biasPick(JET_COL, 1.5);
    var s = p.t * Lj;
    p.x = CX + AX * s; p.y = CY + AY * s;
    p.px = p.x; p.py = p.y;
  }

  function spawnStar(s) {
    s.x = Math.random() * W;
    s.y = Math.random() * H;
    s.z = rnd(0.22, 1.0);
    s.size = 0.45 + s.z * 1.55;
    s.base = rnd(0.40, 1.0) * (0.55 + 0.55 * s.z);
    s.tw = rnd(0.4, 1.8);
    s.ph = rnd(0, TAU);
    s.col = biasPick(STAR_COL, 1.4);
    s.vx = rnd(-1, 1) * 2.4 * s.z;
    s.vy = rnd(-1, 1) * 2.4 * s.z;
  }

  function initParticles() {
    var i;
    acc.length = 0; jet.length = 0; stars.length = 0;
    var an = ACC_N, jn = JET_N, sn = STAR_N;
    // thin the population on small viewports (never inflate it on large ones,
    // where fill-rate is already the expensive part)
    var diag = Math.sqrt(W * W + H * H);
    var f = diag / 1500;
    if (f < 0.5) f = 0.5; else if (f > 1.0) f = 1.0;
    an = (an * f) | 0; jn = (jn * f) | 0; sn = (sn * f) | 0;
    if (Math.min(W, H) < 680) { an = (an * 0.62) | 0; jn = (jn * 0.66) | 0; sn = (sn * 0.78) | 0; }
    for (i = 0; i < an; i++) { var a = {}; spawnAcc(a, true); acc.push(a); }
    for (i = 0; i < jn; i++) { var j = {}; spawnJet(j, true); jet.push(j); }
    for (i = 0; i < sn; i++) { var s = {}; spawnStar(s); stars.push(s); }
    accCap = acc.length; jetCap = jet.length; starCap = stars.length;
  }

  function buildGradients() {
    // Bloom now carries the disc "body" glow too (extra stops), so a single
    // full-canvas pass does the work — no second full-screen fill needed.
    gBloom = mctx.createRadialGradient(CX, CY, 0, CX, CY, R * 2.6);
    gBloom.addColorStop(0.00, "rgba(168,202,255,0.17)");
    gBloom.addColorStop(0.16, "rgba(120,172,255,0.12)");
    gBloom.addColorStop(0.30, "rgba(132,176,255,0.10)");
    gBloom.addColorStop(0.46, "rgba(80,140,250,0.07)");
    gBloom.addColorStop(0.66, "rgba(46,92,205,0.040)");
    gBloom.addColorStop(1.00, "rgba(0,0,0,0)");

    // Compact hot core around the horizon (drawn over a small region only — cheap).
    gHot = mctx.createRadialGradient(CX, CY, SH * 0.5, CX, CY, SH * 2.3);
    gHot.addColorStop(0.00, "rgba(202,224,255,0.24)");
    gHot.addColorStop(0.42, "rgba(116,168,255,0.13)");
    gHot.addColorStop(1.00, "rgba(0,0,0,0)");

    gShadow = mctx.createRadialGradient(CX, CY, SH * 0.20, CX, CY, SH * 1.18);
    gShadow.addColorStop(0.00, "rgba(0,0,0,1)");
    gShadow.addColorStop(0.55, "rgba(0,0,0,1)");
    gShadow.addColorStop(0.80, "rgba(1,3,9,0.80)");
    gShadow.addColorStop(0.93, "rgba(2,5,14,0.35)");
    gShadow.addColorStop(1.00, "rgba(0,0,0,0)");

    var x0 = CX - AX * Lj, y0 = CY - AY * Lj, x1 = CX + AX * Lj, y1 = CY + AY * Lj;
    gDiag = mctx.createLinearGradient(x0, y0, x1, y1);
    gDiag.addColorStop(0.00, "rgba(120,170,255,0.0)");
    gDiag.addColorStop(0.13, "rgba(150,188,255,0.55)");
    gDiag.addColorStop(0.34, "rgba(232,242,255,0.92)");
    gDiag.addColorStop(0.50, "rgba(245,250,255,0.30)");
    gDiag.addColorStop(0.66, "rgba(232,242,255,0.92)");
    gDiag.addColorStop(0.87, "rgba(150,188,255,0.55)");
    gDiag.addColorStop(1.00, "rgba(120,170,255,0.0)");

    // disc gradient used only by the reduced-motion / static frame
    gDisc = mctx.createRadialGradient(CX, CY, SH * 0.8, CX, CY, R * 1.7);
    gDisc.addColorStop(0.00, "rgba(0,0,0,0)");
    gDisc.addColorStop(clamp01(SH / (R * 1.7)), "rgba(150,188,255,0.0)");
    gDisc.addColorStop(0.34, "rgba(120,166,255,0.10)");
    gDisc.addColorStop(0.62, "rgba(206,226,255,0.22)");
    gDisc.addColorStop(0.74, "rgba(150,190,255,0.10)");
    gDisc.addColorStop(1.00, "rgba(0,0,0,0)");
  }

  function resize() {
    if (dead) return;
    try {
      W = Math.max(1, window.innerWidth | 0);
      H = Math.max(1, window.innerHeight | 0);
      DPR = clampDpr();
      [back, main].forEach(function (c) {
        c.width = Math.max(1, Math.round(W * DPR));
        c.height = Math.max(1, Math.round(H * DPR));
        c.style.width = W + "px"; c.style.height = H + "px";
      });
      bctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      mctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      bctx.lineCap = "round"; bctx.lineJoin = "round";
      mctx.lineCap = "round"; mctx.lineJoin = "round";

      CX = W * 0.5; CY = H * 0.5;
      R = Math.min(W, H) * 0.205;
      if (!(R > 0)) R = 1;
      Lj = R * 1.18;
      SH = R * 0.32;
      RIM = SH * 0.99;

      buildGradients();
      if (acc.length === 0) initParticles();
      // a layout change resets the quality target so it can re-settle
      accCap = acc.length; jetCap = jet.length; starCap = stars.length;
      slowSteps = 0; emaDt = 0.016;
      if (REDUCE) renderStatic();
    } catch (err) {
      failToFallback(err);
    }
  }

  var spin = 0.55, INFLOW;

  function renderBack(dt, T) {
    bctx.clearRect(0, 0, W, H);
    var lens = 1.05 * R * R, halo = R * R * 0.25;
    for (var i = 0; i < starCap; i++) {
      var s = stars[i];
      s.x += s.vx * dt; s.y += s.vy * dt;
      if (s.x < -8) s.x += W + 16; else if (s.x > W + 8) s.x -= W + 16;
      if (s.y < -8) s.y += H + 16; else if (s.y > H + 8) s.y -= H + 16;

      var dx = s.x - CX, dy = s.y - CY;
      var d2 = dx * dx + dy * dy, d = Math.sqrt(d2) || 0.0001;
      if (d < SH) continue;
      var scale = 1 + lens / (d2 + halo);
      var ax = CX + dx * scale, ay = CY + dy * scale;

      var tw = 0.6 + 0.4 * Math.sin(T * s.tw + s.ph);
      var ad = d * scale;
      var ring = Math.exp(-Math.pow((ad - SH * 1.25) / (R * 0.22), 2));
      var al = s.base * tw * (1 + ring * 1.6);
      if (al <= 0.01) continue;
      bctx.globalAlpha = al > 1 ? 1 : al;
      bctx.fillStyle = s.col;
      var sz = s.size * (1 + ring * 0.7);
      bctx.beginPath();
      bctx.arc(ax, ay, sz, 0, TAU);
      bctx.fill();
    }
    bctx.globalAlpha = 1;
  }

  function renderMain(dt, T) {
    INFLOW = R * 0.04;

    // trail fade
    mctx.globalCompositeOperation = "source-over";
    mctx.globalAlpha = 1;
    mctx.fillStyle = "rgba(0,0,0,0.15)";
    mctx.fillRect(0, 0, W, H);

    mctx.globalCompositeOperation = "lighter";

    // bloom body (one full-canvas pass) + compact hot core (small region)
    mctx.globalAlpha = 0.9;
    mctx.fillStyle = gBloom;
    mctx.fillRect(0, 0, W, H);

    var hr = SH * 2.3;
    mctx.globalAlpha = 0.7;
    mctx.fillStyle = gHot;
    mctx.fillRect(CX - hr, CY - hr, hr * 2, hr * 2);

    var i, p, swallow = 0;
    for (i = 0; i < accCap; i++) {
      p = acc[i];
      var u = p.r / R;
      var w = spin * (0.45 + 0.9 * Math.pow(u, -1.4));
      p.a += w * dt;
      var inf = INFLOW * (0.22 + Math.min(7, Math.pow(1 / u, 1.9)));
      p.r -= inf * dt;

      if (p.r < SH * 0.94) {
        if (swallow < 16) {
          mctx.globalAlpha = 0.85;
          mctx.fillStyle = "#eaf2ff";
          mctx.beginPath();
          mctx.arc(p.x, p.y, rnd(1.3, 2.8), 0, TAU);
          mctx.fill();
          swallow++;
        }
        spawnAcc(p, false);
        continue;
      }

      p.x = CX + Math.cos(p.a) * p.r;
      p.y = CY + Math.sin(p.a) * p.r;

      var heat = u < 1 ? (1 - u) : 0;
      var al = p.base * (0.55 + 0.9 * heat);
      if (al > 0.95) al = 0.95;
      mctx.globalAlpha = al;
      mctx.strokeStyle = p.col;
      mctx.lineWidth = p.size * (1 + heat * 0.8);
      mctx.beginPath();
      mctx.moveTo(p.px, p.py);
      mctx.lineTo(p.x, p.y);
      mctx.stroke();
      p.px = p.x; p.py = p.y;
    }

    for (i = 0; i < jetCap; i++) {
      p = jet[i];
      var at = Math.abs(p.t);
      var vel = p.spd * (0.45 + 1.7 * at);
      p.t += p.dir * vel * dt;
      if (Math.abs(p.t) > 1.1) { spawnJet(p, false); continue; }

      var s2 = p.t * Lj;
      var off = (gauss() * 0.5 + Math.sin(T * 1.6 + p.wob) * 0.5) * R * (0.018 + 0.05 * (1 - at));
      p.x = CX + AX * s2 + PX * off;
      p.y = CY + AY * s2 + PY * off;

      var jheat = 1 - at;
      var jal = p.base * (0.32 + 0.95 * jheat);
      if (jal > 0.98) jal = 0.98;
      mctx.globalAlpha = jal;
      mctx.strokeStyle = p.col;
      mctx.lineWidth = p.size * (0.7 + jheat * 0.9);
      mctx.beginPath();
      mctx.moveTo(p.px, p.py);
      mctx.lineTo(p.x, p.y);
      mctx.stroke();
      p.px = p.x; p.py = p.y;
    }

    // gentle, eased shimmer
    var shim = 0.88 + 0.10 * Math.sin(T * 1.05) + 0.03 * Math.sin(T * 3.1 + 1.0);
    drawRing(mctx, shim);
    drawDiagonal(mctx, shim);

    // carve event horizon
    mctx.globalCompositeOperation = "source-over";
    mctx.globalAlpha = 1;
    mctx.fillStyle = gShadow;
    mctx.beginPath();
    mctx.arc(CX, CY, SH * 1.18, 0, TAU);
    mctx.fill();

    mctx.globalCompositeOperation = "lighter";
    drawRim(mctx, shim);

    mctx.globalAlpha = 1;
    mctx.globalCompositeOperation = "source-over";
  }

  function drawRing(ctx, shim) {
    ctx.strokeStyle = "rgb(216,231,255)";
    ctx.globalAlpha = 0.6 * shim;
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, TAU); ctx.stroke();

    ctx.strokeStyle = "rgb(120,170,255)";
    ctx.globalAlpha = 0.15 * shim;
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, TAU); ctx.stroke();

    ctx.strokeStyle = "rgb(70,130,255)";
    ctx.globalAlpha = 0.065 * shim;
    ctx.lineWidth = 12;
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, TAU); ctx.stroke();
  }

  function drawDiagonal(ctx, shim) {
    var x0 = CX - AX * Lj, y0 = CY - AY * Lj, x1 = CX + AX * Lj, y1 = CY + AY * Lj;
    ctx.strokeStyle = gDiag;
    ctx.globalAlpha = 0.96 * shim;
    ctx.lineWidth = 2.2;
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();

    ctx.globalAlpha = 0.17 * shim;
    ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
  }

  function drawRim(ctx, shim) {
    ctx.strokeStyle = "rgb(226,239,255)";
    ctx.globalAlpha = 0.52 * shim;
    ctx.lineWidth = 2.0;
    ctx.beginPath(); ctx.arc(CX, CY, RIM, 0, TAU); ctx.stroke();

    ctx.strokeStyle = "rgb(130,180,255)";
    ctx.globalAlpha = 0.22 * shim;
    ctx.lineWidth = 6;
    ctx.beginPath(); ctx.arc(CX, CY, RIM, 0, TAU); ctx.stroke();

    var hx = AX * RIM, hy = AY * RIM;
    ctx.fillStyle = "rgb(245,250,255)";
    ctx.globalAlpha = 0.52 * shim;
    ctx.beginPath(); ctx.arc(CX + hx, CY + hy, 2.4, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(CX - hx, CY - hy, 2.4, 0, TAU); ctx.fill();
  }

  function renderStatic() {
    if (dead) return;
    try {
      bctx.clearRect(0, 0, W, H);
      var lens = 1.05 * R * R, halo = R * R * 0.25;
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var dx = s.x - CX, dy = s.y - CY;
        var d2 = dx * dx + dy * dy, d = Math.sqrt(d2) || 0.0001;
        if (d < SH) continue;
        var scale = 1 + lens / (d2 + halo);
        var ax = CX + dx * scale, ay = CY + dy * scale;
        var ad = d * scale;
        var ring = Math.exp(-Math.pow((ad - SH * 1.25) / (R * 0.22), 2));
        bctx.globalAlpha = Math.min(1, s.base * (1 + ring * 1.4));
        bctx.fillStyle = s.col;
        bctx.beginPath(); bctx.arc(ax, ay, s.size * (1 + ring * 0.6), 0, TAU); bctx.fill();
      }
      bctx.globalAlpha = 1;

      mctx.globalCompositeOperation = "source-over";
      mctx.clearRect(0, 0, W, H);
      mctx.globalCompositeOperation = "lighter";

      mctx.globalAlpha = 1; mctx.fillStyle = gBloom; mctx.fillRect(0, 0, W, H);
      mctx.globalAlpha = 1; mctx.fillStyle = gDisc; mctx.fillRect(0, 0, W, H);
      var hr = SH * 2.3;
      mctx.globalAlpha = 0.9; mctx.fillStyle = gHot;
      mctx.fillRect(CX - hr, CY - hr, hr * 2, hr * 2);

      drawRing(mctx, 1);
      drawDiagonal(mctx, 1);

      mctx.globalCompositeOperation = "source-over";
      mctx.globalAlpha = 1; mctx.fillStyle = gShadow;
      mctx.beginPath(); mctx.arc(CX, CY, SH * 1.18, 0, TAU); mctx.fill();

      mctx.globalCompositeOperation = "lighter";
      drawRim(mctx, 1);
      mctx.globalAlpha = 1;
      mctx.globalCompositeOperation = "source-over";
    } catch (err) {
      failToFallback(err);
    }
  }

  // ---- main loop + one-way adaptive quality governor ----
  var last = 0, T = 0, rafId = 0, running = false;
  var emaDt = 0.016, slowSteps = 0, govCount = 0;

  function governor(dt) {
    emaDt = emaDt * 0.9 + dt * 0.1;
    if (++govCount < 45) return;
    govCount = 0;
    if (emaDt > 0.025 && slowSteps < 6) {   // sustained < ~40fps -> shed load
      slowSteps++;
      accCap = Math.max((acc.length * 0.35) | 0, (accCap * 0.82) | 0);
      jetCap = Math.max((jet.length * 0.35) | 0, (jetCap * 0.82) | 0);
      starCap = Math.max((stars.length * 0.45) | 0, (starCap * 0.85) | 0);
    }
  }

  function frame(ts) {
    if (dead) return;
    rafId = raf(frame);
    var dt = (ts - last) / 1000;
    last = ts;
    if (!isFinite(dt) || dt <= 0) dt = 0.016;
    if (dt > 0.05) dt = 0.05;
    T += dt;
    try {
      governor(dt);
      renderBack(dt, T);
      renderMain(dt, T);
    } catch (err) {
      failToFallback(err);
    }
  }

  function start() {
    if (running || REDUCE || dead) return;
    running = true;
    last = now();
    rafId = raf(frame);
  }
  function stop() {
    running = false;
    if (rafId) caf(rafId);
    rafId = 0;
  }

  document.addEventListener("visibilitychange", function () {
    if (document.hidden) stop();
    else if (!REDUCE && !dead) { last = now(); start(); }
  });

  if (mq) {
    var onMq = function () {
      REDUCE = mq.matches;
      if (dead) return;
      if (REDUCE) { stop(); resize(); renderStatic(); }
      else { resize(); start(); }
    };
    if (mq.addEventListener) mq.addEventListener("change", onMq);
    else if (mq.addListener) mq.addListener(onMq);
  }

  var rT = 0;
  function scheduleResize(delay) {
    if (rT) clearTimeout(rT);
    rT = setTimeout(function () { rT = 0; resize(); }, delay);
  }
  window.addEventListener("resize", function () { scheduleResize(140); });
  window.addEventListener("orientationchange", function () { scheduleResize(180); });

  try {
    resize();
    if (REDUCE) renderStatic();
    else start();
  } catch (err) {
    failToFallback(err);
  }
})();
</script>
</body>
</html>

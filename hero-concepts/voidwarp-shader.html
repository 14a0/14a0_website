<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>14AØ — Voidwarp</title>
<style>
  :root{ color-scheme: dark; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; background:#000; overflow:hidden; }
  body{ font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

  #stage{ position:fixed; inset:0; width:100vw; height:100vh; background:#000; z-index:0; }
  #gl{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* --- minimal premium UI overlay --- */
  .ui{ position:fixed; inset:0; z-index:3; pointer-events:none; }
  .brand{
    position:absolute; top:clamp(20px,3.4vh,34px); left:clamp(20px,3.4vw,40px);
    font-size:clamp(13px,1.5vw,16px); letter-spacing:.46em; font-weight:600;
    color:#dfe8fb; opacity:0; transform:translateY(-6px);
    text-shadow:0 0 22px rgba(51,133,255,.55);
    animation:rise 1.8s cubic-bezier(.16,.84,.3,1) 1.0s forwards;
  }
  .meta{
    position:absolute; top:clamp(20px,3.4vh,34px); right:clamp(20px,3.4vw,40px);
    font-size:clamp(9px,1vw,11px); letter-spacing:.34em; font-weight:500;
    text-transform:uppercase; color:#6f7da0; opacity:0; transform:translateY(-6px);
    animation:rise 1.8s cubic-bezier(.16,.84,.3,1) 1.35s forwards;
  }
  .tag{
    position:absolute; left:50%; bottom:clamp(22px,4vh,40px); transform:translate(-50%,8px);
    font-size:clamp(9px,1.05vw,11.5px); letter-spacing:.38em; font-weight:500;
    text-transform:uppercase; color:#8b97b4; opacity:0; white-space:nowrap;
    animation:riseC 2s cubic-bezier(.16,.84,.3,1) 1.7s forwards;
  }
  .tag .dot{ color:#3385ff; padding:0 .55em; }
  @keyframes rise{ to{ opacity:.72; transform:translateY(0);} }
  @keyframes riseC{ to{ opacity:.72; transform:translate(-50%,0);} }

  /* hairline corner ticks for an engineered feel */
  .frame{ position:fixed; inset:0; z-index:2; pointer-events:none;
    opacity:0; animation:fadein 2.4s ease 1.2s forwards; }
  .frame span{ position:absolute; width:14px; height:14px; border:1px solid rgba(150,175,225,.22); }
  .frame .tl{ top:18px; left:18px; border-right:0; border-bottom:0; }
  .frame .tr{ top:18px; right:18px; border-left:0; border-bottom:0; }
  .frame .bl{ bottom:18px; left:18px; border-right:0; border-top:0; }
  .frame .br{ bottom:18px; right:18px; border-left:0; border-top:0; }
  @keyframes fadein{ to{ opacity:1; } }

  /* --- graceful fallback: pure-CSS Ø black-hole --- */
  #fallback{
    position:fixed; inset:0; z-index:1; display:none;
    align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 48%, #060a14 0%, #02030b 52%, #000 100%);
  }
  #fallback .oe{
    position:relative; width:min(42vmin,330px); height:min(42vmin,330px);
    border-radius:50%;
    border:2.5px solid rgba(214,228,255,.92);
    box-shadow:
      0 0 70px 6px rgba(43,107,255,.42),
      0 0 170px 18px rgba(43,107,255,.18),
      inset 0 0 46px rgba(24,56,150,.55),
      inset 0 0 8px rgba(220,235,255,.5);
    animation:breathe 7s ease-in-out infinite;
  }
  #fallback .oe::before{
    content:""; position:absolute; left:50%; top:-15%;
    width:2.5px; height:130%;
    transform:translateX(-50%) rotate(45deg); transform-origin:center;
    background:linear-gradient(180deg, rgba(120,170,255,0) 0%, rgba(176,208,255,.96) 50%, rgba(120,170,255,0) 100%);
    box-shadow:0 0 18px rgba(51,133,255,.95), 0 0 40px rgba(51,133,255,.5);
  }
  @keyframes breathe{ 0%,100%{ filter:brightness(1);} 50%{ filter:brightness(1.18);} }

  @media (prefers-reduced-motion: reduce){
    .brand,.meta,.tag,.frame{ animation:none; opacity:.7; transform:none; }
    .tag{ transform:translateX(-50%); }
    #fallback .oe{ animation:none; }
  }
</style>
</head>
<body>
  <div id="stage"><canvas id="gl"></canvas></div>

  <!-- fallback (revealed only if WebGL fails) -->
  <div id="fallback"><div class="oe"></div></div>

  <div class="frame"><span class="tl"></span><span class="tr"></span><span class="bl"></span><span class="br"></span></div>

  <div class="ui">
    <div class="brand">14A&#216;</div>
    <div class="meta">VOIDWARP &middot; 001</div>
    <div class="tag">Artificial Intelligence <span class="dot">/</span> Robotics <span class="dot">/</span> Frontier Systems</div>
  </div>

<script>
(function(){
  "use strict";
  var canvas   = document.getElementById('gl');
  var fallback = document.getElementById('fallback');
  var stage    = document.getElementById('stage');

  if(!canvas || !stage){ if(fallback) fallback.style.display='flex'; return; }

  var shownFallback = false;
  function showFallback(reason){
    if(shownFallback) return;
    shownFallback = true;
    if(reason){ try{ console.warn('[14AO] '+reason+' - graceful fallback engaged.'); }catch(e){} }
    if(canvas) canvas.style.display='none';
    if(fallback) fallback.style.display='flex';
  }

  // ---- reduced motion (observed live) ----
  var mq = (window.matchMedia ? window.matchMedia('(prefers-reduced-motion: reduce)') : null);
  var reduced = !!(mq && mq.matches);

  // ---- WebGL context (robust) ----
  var gl=null;
  try{
    var opts={ antialias:false, alpha:false, depth:false, stencil:false,
               premultipliedAlpha:false, preserveDrawingBuffer:false,
               powerPreference:'high-performance', failIfMajorPerformanceCaveat:false };
    gl = canvas.getContext('webgl', opts) || canvas.getContext('experimental-webgl', opts);
  }catch(e){ gl=null; }
  if(!gl){ showFallback('WebGL unavailable'); return; }

  // ---------------- shaders ----------------
  var VERT = [
    'attribute vec2 aPos;',
    'void main(){ gl_Position = vec4(aPos,0.0,1.0); }'
  ].join('\n');

  var FRAG = [
  '#ifdef GL_FRAGMENT_PRECISION_HIGH',
  'precision highp float;',
  '#else',
  'precision mediump float;',
  '#endif',
  'uniform vec2 uRes;',
  'uniform float uTime;',
  'uniform vec2 uMouse;',

  'float hash21(vec2 p){',
  '  p = fract(p*vec2(123.34,456.21));',
  '  p += dot(p, p+45.32);',
  '  return fract(p.x*p.y);',
  '}',

  'float vnoise(vec2 p){',
  '  vec2 i = floor(p); vec2 f = fract(p);',
  '  vec2 u = f*f*(3.0-2.0*f);',
  '  float a = hash21(i);',
  '  float b = hash21(i+vec2(1.0,0.0));',
  '  float c = hash21(i+vec2(0.0,1.0));',
  '  float d = hash21(i+vec2(1.0,1.0));',
  '  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);',
  '}',

  'const mat2 M = mat2(1.62,1.18,-1.18,1.62);',

  'float fbm(vec2 p){',
  '  float v=0.0, a=0.5;',
  '  for(int i=0;i<5;i++){ v += a*vnoise(p); p = M*p; a *= 0.5; }',
  '  return v;',
  '}',
  'float fbm3(vec2 p){',
  '  float v=0.0, a=0.5;',
  '  for(int i=0;i<3;i++){ v += a*vnoise(p); p = M*p; a *= 0.5; }',
  '  return v;',
  '}',

  'vec2 rot(vec2 p, float a){ float c=cos(a), s=sin(a); return mat2(c,-s,s,c)*p; }',

  'float accretion(vec2 p, float t){',
  '  float r = length(p);',
  '  float spin = 2.30*log(r+0.08) + t*0.20;',
  '  vec2 q = rot(p, spin);',
  '  vec2 rad = normalize(q + vec2(1e-4,1e-4));',
  '  vec2 base = q*4.2 + rad*(t*0.42);',
  '  float tw = t*0.10;',
  '  vec2 warp = vec2( fbm3(base*0.70 + vec2(0.0, tw)),',
  '                    fbm3(base*0.70 + vec2(5.2,-tw)) );',
  '  float n = fbm(base + warp*2.30);',
  '  return n;',
  '}',

  'vec3 plasmaColor(float n){',
  '  vec3 c1 = vec3(0.006,0.020,0.060);',
  '  vec3 c2 = vec3(0.020,0.150,0.480);',
  '  vec3 c3 = vec3(0.230,0.520,1.000);',
  '  vec3 c4 = vec3(0.840,0.930,1.000);',
  '  vec3 c = mix(c1,c2, smoothstep(0.00,0.45,n));',
  '  c = mix(c, c3, smoothstep(0.40,0.72,n));',
  '  c = mix(c, c4, smoothstep(0.72,1.00,n));',
  '  return c;',
  '}',

  'float starLayer(vec2 x){',
  '  vec2 i = floor(x); vec2 f = fract(x)-0.5;',
  '  float h = hash21(i+11.0);',
  '  float s = step(0.93, h);',
  '  vec2 c = (vec2(hash21(i+3.0), hash21(i+7.0))-0.5)*0.7;',
  '  float d = length(f-c);',
  '  return s * smoothstep(0.055,0.0,d) * (0.35+0.65*hash21(i+5.0));',
  '}',

  'void main(){',
  '  vec2 res = max(uRes, vec2(1.0));',
  '  float m = min(res.x,res.y);',
  '  vec2 p = (gl_FragCoord.xy - 0.5*res)/m;',
  '  float t = uTime;',
  '  float r = length(p);',
  '  float ang = atan(p.y,p.x);',

  '  float ring = 0.270 + 0.004*sin(t*0.45);',
  '  vec3 col = vec3(0.0);',

  '  {',
  '    float lens = 0.050/(r+0.060);',
  '    vec2 sdir = p/(r+1e-4);',
  '    vec2 luv = p - sdir*lens;',
  '    luv = rot(luv, lens*4.5 + t*0.020);',
  '    luv += uMouse*0.045;',
  '    float st = starLayer(luv*7.2) + 0.65*starLayer(luv*4.3 + 30.0);',
  '    float mask = smoothstep(ring*1.05, ring*1.9, r);',
  '    col += st * mask * vec3(0.70,0.82,1.00) * 0.62;',
  '  }',

  '  float horizon = smoothstep(ring-0.006, ring+0.014, r);',
  '  float outer   = exp(-pow(max(r-ring,0.0)/0.170, 1.25));',
  '  float env     = horizon*outer;',
  '  float n = accretion(p,t);',
  '  n = pow(clamp(n,0.0,1.0), 1.55);',
  '  float dens = n*env;',
  '  col += plasmaColor(clamp(dens*1.70,0.0,1.0)) * (dens*2.55);',

  '  float halo = exp(-pow((r-ring)/0.120,2.0)) * 0.50 * horizon;',
  '  col += vec3(0.075,0.220,0.600) * halo * 0.65;',

  '  float shim = 0.78 + 0.22*sin(ang*3.0 - t*0.9)*sin(ang*2.0 + t*0.55);',
  '  float caR = 0.0026, w0 = 0.0085;',
  '  float pg = exp(-pow((r     -ring)/w0,2.0));',
  '  float pb = exp(-pow((r-caR -ring)/w0,2.0));',
  '  vec3 ringC = pg * vec3(0.86,0.96,1.12);',
  '  ringC += vec3(0.02,0.10,0.30) * max(pb-pg,0.0);',
  '  col += ringC * 2.35 * shim;',

  '  float diag  = abs(p.x - p.y)*0.70710678;',
  '  float along = (p.x + p.y)*0.70710678;',
  '  float seg   = smoothstep(ring+0.066, ring+0.040, abs(along));',
  '  float cw = 0.0052;',
  '  float cr = exp(-pow((diag-0.0035)/cw,2.0));',
  '  float cg = exp(-pow((diag       )/cw,2.0));',
  '  float cb = exp(-pow((diag+0.0035)/cw,2.0));',
  '  float pulse = 0.55 + 0.45*sin(along*22.0 - t*3.0);',
  '  vec3 crackCol = vec3(cr,cg,cb) * seg * vec3(0.55,0.80,1.50);',
  '  col += crackCol * (1.35 + 0.85*pulse);',
  '  float crackGlow = exp(-pow(diag/0.026,2.0)) * seg;',
  '  col += vec3(0.10,0.26,0.72) * crackGlow * 0.45;',

  '  col = 1.0 - exp(-col*1.30);',
  '  col = pow(clamp(col,0.0,1.0), vec3(0.86));',
  '  col = mix(col, col*col*(3.0-2.0*col), 0.12);',
  '  float vig = smoothstep(1.30, 0.30, length(p)*1.32);',
  '  col *= mix(0.50, 1.0, vig);',
  '  col = clamp(col, 0.0, 1.0);',
  '  col += (hash21(gl_FragCoord.xy + fract(t)) - 0.5)/255.0;',

  '  gl_FragColor = vec4(col, 1.0);',
  '}'
  ].join('\n');

  // ---------------- compile / link (robust) ----------------
  function compile(type, src){
    var sh = gl.createShader(type);
    if(!sh) return null;
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if(!gl.getShaderParameter(sh, gl.COMPILE_STATUS)){
      try{ console.error('[14AO] shader compile failed:\n'+gl.getShaderInfoLog(sh)); }catch(e){}
      gl.deleteShader(sh);
      return null;
    }
    return sh;
  }

  var vs = compile(gl.VERTEX_SHADER, VERT);
  var fs = compile(gl.FRAGMENT_SHADER, FRAG);
  if(!vs || !fs){ showFallback('shader compile failed'); return; }

  var prog = gl.createProgram();
  if(!prog){ showFallback('program alloc failed'); return; }
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.bindAttribLocation(prog, 0, 'aPos');
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog, gl.LINK_STATUS)){
    try{ console.error('[14AO] program link failed:\n'+gl.getProgramInfoLog(prog)); }catch(e){}
    showFallback('shader link failed');
    return;
  }
  // shaders are flagged for deletion; they persist until the program is gone
  gl.detachShader(prog, vs); gl.deleteShader(vs);
  gl.detachShader(prog, fs); gl.deleteShader(fs);
  gl.useProgram(prog);

  // fullscreen triangle
  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

  var uRes   = gl.getUniformLocation(prog,'uRes');
  var uTime  = gl.getUniformLocation(prog,'uTime');
  var uMouse = gl.getUniformLocation(prog,'uMouse');

  // ---------------- state ----------------
  var W=0, H=0;
  // Keep the heavy fragment shader smooth: cap DPR at 2 AND cap the total
  // backing-store pixel budget so very high-res displays stay performant.
  var MAX_PX = 3.5e6;

  var mx=0, my=0, tmx=0, tmy=0;
  var simTime = reduced ? 9.0 : 0.0;

  function nowMs(){ return (window.performance && performance.now) ? performance.now() : Date.now(); }
  var last = nowMs();
  var raf = null, running = false, contextLost = false, lossTimer = null;

  function drawOnce(){
    if(contextLost) return;
    if(uMouse) gl.uniform2f(uMouse, mx, my);
    if(uTime)  gl.uniform1f(uTime, simTime);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }

  // ---------------- sizing ----------------
  function resize(){
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var cw = stage.clientWidth  || window.innerWidth  || 1;
    var ch = stage.clientHeight || window.innerHeight || 1;
    var w = Math.max(1, Math.round(cw * dpr));
    var h = Math.max(1, Math.round(ch * dpr));
    var px = w * h;
    if(px > MAX_PX){
      var s = Math.sqrt(MAX_PX / px);
      w = Math.max(1, Math.round(w * s));
      h = Math.max(1, Math.round(h * s));
    }
    W = w; H = h;
    if(canvas.width  !== W) canvas.width  = W;
    if(canvas.height !== H) canvas.height = H;
    gl.viewport(0, 0, W, H);
    if(uRes) gl.uniform2f(uRes, W, H);
    if(!running && !contextLost) drawOnce(); // repaint static / paused frame immediately
  }

  // ---------------- input (parallax) ----------------
  window.addEventListener('pointermove', function(e){
    if(reduced) return;
    var iw = window.innerWidth  || 1;
    var ih = window.innerHeight || 1;
    tmx = (e.clientX / iw) * 2.0 - 1.0;
    tmy = (1.0 - e.clientY / ih) * 2.0 - 1.0;
  }, {passive:true});

  // ---------------- loop ----------------
  function frame(now){
    if(!running) return;
    var dt = (now - last) / 1000; last = now;
    if(dt > 0.05) dt = 0.05;
    if(dt < 0)    dt = 0;
    simTime += dt;
    mx += (tmx - mx) * 0.045;
    my += (tmy - my) * 0.045;
    drawOnce();
    raf = requestAnimationFrame(frame);
  }
  function startLoop(){
    if(running || reduced || contextLost) return;
    running = true; last = nowMs();
    raf = requestAnimationFrame(frame);
  }
  function stopLoop(){
    running = false;
    if(raf){ cancelAnimationFrame(raf); raf = null; }
  }

  // ---------------- reduced-motion live toggle ----------------
  function onReducedChange(){
    var next = !!(mq && mq.matches);
    if(next === reduced) return;
    reduced = next;
    if(reduced){
      stopLoop();
      simTime = 9.0;            // settled, calm composition
      tmx = tmy = mx = my = 0;
      drawOnce();
    }else{
      startLoop();
    }
  }
  if(mq){
    if(mq.addEventListener)      mq.addEventListener('change', onReducedChange);
    else if(mq.addListener)      mq.addListener(onReducedChange); // legacy Safari
  }

  // ---------------- pause when hidden ----------------
  document.addEventListener('visibilitychange', function(){
    if(document.hidden){ stopLoop(); }
    else { if(reduced) drawOnce(); else startLoop(); }
  });

  // ---------------- context-loss safety ----------------
  canvas.addEventListener('webglcontextlost', function(e){
    e.preventDefault();
    contextLost = true;
    stopLoop();
    if(lossTimer){ clearTimeout(lossTimer); }
    // if the GPU never restores the context, degrade gracefully
    lossTimer = setTimeout(function(){ if(contextLost) showFallback('WebGL context lost'); }, 4000);
  }, false);
  canvas.addEventListener('webglcontextrestored', function(){
    if(lossTimer){ clearTimeout(lossTimer); lossTimer = null; }
    // simplest fully-correct recovery: rebuild all GL state from scratch
    try{ location.reload(); }
    catch(err){ contextLost = false; showFallback('WebGL context lost'); }
  }, false);

  window.addEventListener('resize', resize, {passive:true});
  window.addEventListener('orientationchange', resize, {passive:true});

  // ---------------- boot ----------------
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  resize();
  if(reduced){ drawOnce(); }
  else       { startLoop(); }

  var err = gl.getError();
  if(err && err !== gl.NO_ERROR){ try{ console.warn('[14AO] glGetError '+err); }catch(e){} }
})();
</script>
</body>
</html>

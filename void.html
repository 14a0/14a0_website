<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000005">
<title>14AØ</title>
<style>
  :root{ --accent:#3385ff; --accent-deep:#0066ff; --silver:#e6eeff; color-scheme:dark; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:#000005; overflow:hidden; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--silver);
    -webkit-font-smoothing:antialiased;
  }
  /* width/height are pinned to window.innerWidth/innerHeight in px by JS so the
     canvas never relies on iOS's 100vh (which differs from the visible height). */
  #stage{ position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000005; }
  /* the cosmos shader sits behind everything */
  #gl{ position:absolute; inset:0; width:100%; height:100%; display:block; z-index:1; }
  /* spiraling-infall particle layer, additive, above the shader */
  #fx{ position:absolute; inset:0; width:100%; height:100%; display:block; z-index:2; pointer-events:none; }
  /* crisp brand mark overlay */
  #mark{
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    z-index:3; pointer-events:none;
    overflow:visible;
    will-change:transform,filter;
    animation:breathe 11s cubic-bezier(.45,.05,.55,.95) infinite;
  }
  @keyframes breathe{
    0%,100%{ filter:drop-shadow(0 0 6px rgba(120,170,255,.55)) drop-shadow(0 0 22px rgba(51,133,255,.35)); }
    50%    { filter:drop-shadow(0 0 12px rgba(160,200,255,.85)) drop-shadow(0 0 44px rgba(51,133,255,.55)); }
  }
  .ring{ fill:none; stroke:#eaf1ff; stroke-width:2.0; stroke-linecap:round; }
  .ring-inner{ fill:none; stroke:rgba(180,210,255,.55); stroke-width:0.6; }
  .ring-mouth{ fill:none; stroke:rgba(150,190,255,.28); stroke-width:0.45; }
  .diag{ fill:none; stroke:#eaf1ff; stroke-width:2.0; stroke-linecap:round; }
  /* the travelling light-jet streak running along the diagonal */
  .streak{
    fill:none; stroke:#dff0ff; stroke-width:2.6; stroke-linecap:round;
    stroke-dasharray:7 300; stroke-dashoffset:300;
    filter:url(#jetglow);
    animation:travel 3.6s linear infinite;
  }
  @keyframes travel{
    0%   { stroke-dashoffset:64; opacity:0; }
    12%  { opacity:1; }
    88%  { opacity:1; }
    100% { stroke-dashoffset:-72; opacity:0; }
  }
  /* ===== subtle, removable brand overlay (wordmark + tagline) ===== */
  #tag{
    position:absolute; left:0; right:0; bottom:6.2%; z-index:3;
    text-align:center; pointer-events:none;
    font-size:clamp(9px,1.05vw,13px);
    letter-spacing:.62em; text-indent:.62em;
    font-weight:500; color:rgba(210,224,255,.62);
    animation:fadeup2 2.6s ease 0.4s both;
  }
  #wordmark{
    position:absolute; left:50%; top:calc(50% + 26%); transform:translateX(-50%);
    z-index:3; pointer-events:none;
    font-size:clamp(13px,1.6vw,20px); letter-spacing:.42em; text-indent:.42em;
    font-weight:600; color:rgba(224,234,255,.9);
    animation:fadeup 2.6s ease 0.2s both;
  }
  @keyframes fadeup{ from{ opacity:0; transform:translate(-50%,8px);} to{opacity:1; transform:translate(-50%,0);} }
  @keyframes fadeup2{ from{opacity:0;} to{opacity:1;} }

  /* graceful reduced-motion: kill all motion, keep an elegant still frame */
  body.reduced #mark{ animation:none;
    filter:drop-shadow(0 0 9px rgba(140,185,255,.7)) drop-shadow(0 0 30px rgba(51,133,255,.4)); }
  body.reduced .streak{ animation:none; opacity:.9; stroke-dashoffset:-4; }
  body.reduced #tag, body.reduced #wordmark{ animation:none; opacity:1; }
  body.reduced #wordmark{ transform:translateX(-50%); }
  @media (prefers-reduced-motion: reduce){
    #mark,.streak,#tag,#wordmark{ animation:none !important; }
  }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="gl"></canvas>
    <canvas id="fx"></canvas>

  <!-- CRISP brand mark: ring + diagonal slightly beyond the circle (upper-right -> lower-left) -->
  <svg id="mark" viewBox="0 0 100 100" width="300" height="300" role="img" aria-label="14A&#216;">
    <defs>
      <filter id="jetglow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="1.4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <!-- faint inner concentric rings echo the wormhole mouth (depth) -->
    <circle class="ring-mouth" cx="50" cy="50" r="13.6"/>
    <circle class="ring-inner" cx="50" cy="50" r="16.4"/>
    <!-- the ring (photon sphere / event horizon) -->
    <circle class="ring" cx="50" cy="50" r="18"/>
    <!-- the diagonal (relativistic light jet) extends beyond the ring at both ends -->
    <line class="diag"   x1="67.3" y1="32.7" x2="32.7" y2="67.3"/>
    <line class="streak" x1="67.3" y1="32.7" x2="32.7" y2="67.3"/>
  </svg>

  <!-- overlay: delete these two lines to remove the wordmark/tagline -->
  <div id="wordmark">14A&#216;</div>
  <div id="tag">FRONTIER&nbsp;INTELLIGENCE&nbsp;&nbsp;&middot;&nbsp;&nbsp;EMBODIED&nbsp;SYSTEMS</div>
  </div>

<script>
"use strict";
(function(){
  var TAU = Math.PI*2;
  var canvas = document.getElementById('gl');
  var fx     = document.getElementById('fx');
  var svg    = document.getElementById('mark');
  var stage  = document.getElementById('stage');
  var reduceMQ = (window.matchMedia)
      ? window.matchMedia('(prefers-reduced-motion: reduce)')
      : { matches:false, addEventListener:null, addListener:null };
  var reduce = !!reduceMQ.matches;
  if(reduce){ document.body.classList.add('reduced'); }

  // ---------- shared sizing ----------
  var W=1, H=1, dpr=1, ringR=0.18;
  var DPR_CAP=2, TARGET_PX=2100000;
  // CSS-pixel geometry shared by the particle layer (matches the crisp SVG mark)
  var vCW=1, vCH=1, cxpx=0, cypx=0, ringPx=1;

  function clampN(v,a,b){ return v<a?a:(v>b?b:v); }
  function clamp01(v){ if(!(v>0)) return 0; if(v>1) return 1; return v; }

  function computeSize(){
    var cssW = Math.max(1, window.innerWidth  || document.documentElement.clientWidth  || 1);
    var cssH = Math.max(1, window.innerHeight || document.documentElement.clientHeight || 1);
    var dev  = window.devicePixelRatio || 1;
    if(!(dev>0) || !isFinite(dev)) dev=1;                  // guard NaN/Infinity DPR
    var scale = Math.min(DPR_CAP, dev);
    var maxScale = Math.sqrt(TARGET_PX/Math.max(1,(cssW*cssH)));
    if(scale > maxScale) scale = maxScale;                 // clamp pixel budget on huge screens
    scale = Math.max(0.6, Math.min(scale, DPR_CAP));       // DPR hard-capped at 2
    if(!(scale>0) || !isFinite(scale)) scale=1;            // belt-and-braces against NaN
    dpr = scale;
    W = Math.max(1, Math.round(cssW*dpr));
    H = Math.max(1, Math.round(cssH*dpr));
    // ring radius in shader uv units (uv normalized by buffer height); aspect-aware so it
    // matches the crisp SVG ring (0.18 * min(W,H)) in both axes
    ringR = 0.18 * Math.min(cssW,cssH) / cssH;
    // crisp mark: square sized to the smaller viewport dimension
    var Sm = Math.min(cssW,cssH);
    svg.setAttribute('width', Sm);
    svg.setAttribute('height', Sm);
    // shared CSS-px geometry for the particle overlay
    vCW=cssW; vCH=cssH; cxpx=cssW*0.5; cypx=cssH*0.5; ringPx=0.18*Sm;
    // Pin the stage (and thus both canvases + the centered mark) to the REAL
    // visible viewport in px. On iOS Safari 100vh != window.innerHeight, so
    // relying on 100vh stretched the shader and pushed the black hole below
    // the crisp mark. Sizing in px keeps display == backing-store == mark center.
    if(stage){ stage.style.width = cssW + 'px'; stage.style.height = cssH + 'px'; }
    sizeFx();
  }

  // ====================================================================
  //  WEBGL PATH  (cosmos: lensed stars, domain-warped plasma swirl,
  //  wormhole-tunnel streaks, doppler-bright disk, photon ring,
  //  chromatic diagonal jet, halo, slow orbital drift)
  // ====================================================================
  var VERT = [
    'attribute vec2 position;',
    'void main(){ gl_Position = vec4(position,0.0,1.0); }'
  ].join('\n');

  var FRAG = [
    '#ifdef GL_FRAGMENT_PRECISION_HIGH',
    'precision highp float;',
    '#else',
    'precision mediump float;',
    '#endif',
    'uniform vec2  u_res;',
    'uniform float u_time;',
    'uniform float u_ringR;',
    '',
    'float hash21(vec2 p){',
    '  p = fract(p*vec2(123.34,345.45));',
    '  p += dot(p, p+34.345);',
    '  return fract(p.x*p.y);',
    '}',
    'float vnoise(vec2 p){',
    '  vec2 i=floor(p), f=fract(p);',
    '  f=f*f*(3.0-2.0*f);',
    '  float a=hash21(i);',
    '  float b=hash21(i+vec2(1.0,0.0));',
    '  float c=hash21(i+vec2(0.0,1.0));',
    '  float d=hash21(i+vec2(1.0,1.0));',
    '  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);',
    '}',
    'float fbm(vec2 p){',
    '  float v=0.0, a=0.5;',
    '  for(int i=0;i<4;i++){ v+=a*vnoise(p); p=p*2.02+vec2(7.1,3.7); a*=0.5; }',
    '  return v;',
    '}',
    'float fbm3(vec2 p){',
    '  float v=0.0, a=0.5;',
    '  for(int i=0;i<3;i++){ v+=a*vnoise(p); p=p*2.02+vec2(7.1,3.7); a*=0.5; }',
    '  return v;',
    '}',
    'mat2 rotm(float an){ float c=cos(an), s=sin(an); return mat2(c,-s,s,c); }',
    'vec3 plasmaColor(float n){',
    '  vec3 c1=vec3(0.010,0.030,0.090);',
    '  vec3 c2=vec3(0.030,0.180,0.500);',
    '  vec3 c3=vec3(0.250,0.550,1.000);',
    '  vec3 c4=vec3(0.860,0.940,1.000);',
    '  vec3 c=mix(c1,c2,smoothstep(0.00,0.45,n));',
    '  c=mix(c,c3,smoothstep(0.40,0.72,n));',
    '  c=mix(c,c4,smoothstep(0.72,1.00,n));',
    '  return c;',
    '}',
    'float starLayer(vec2 s, float t){',
    '  vec2 id=floor(s); vec2 f=fract(s)-0.5;',
    '  vec2 off=(vec2(hash21(id+0.13),hash21(id+0.71))-0.5)*0.74;',
    '  float d=length(f-off);',
    '  float seed=hash21(id+2.37);',
    '  float bright=pow(seed,15.0);',
    '  float tw=0.72+0.28*sin(t*2.3+seed*40.0);',
    '  return smoothstep(0.17,0.0,d)*bright*tw;',
    '}',
    'float starField(vec2 s, float t){',
    '  float c=0.0;',
    '  c+=starLayer(s, t);',
    '  c+=starLayer(s*2.3+vec2(13.0,7.0), t)*0.6;',
    '  return c;',
    '}',
    '',
    'void main(){',
    '  vec2 uv=(gl_FragCoord.xy-0.5*u_res)/max(u_res.y,1.0);',
    '  float t=u_time;',
    '  float ringR=max(u_ringR,0.02);',
    '  float orbit=t*0.035;',
    '  vec2 sway=vec2(sin(t*0.07),cos(t*0.061))*0.010;',
    '  vec2 uvs=uv+sway;',
    '  float r=length(uv);',
    '  float a=atan(uv.y,uv.x);',
    '  float Rn=r/ringR;',
    '',
    '  // relativistic beaming: one side (left) noticeably brighter, slow precession',
    '  float dopAng=3.14159+0.05*t;',
    '  float doppler=clamp(1.0+0.85*cos(a-dopAng),0.18,1.92);',
    '',
    '  // ---- gravitationally lensed starfield (slow orbit) ----',
    '  float k=ringR*ringR*1.5;',
    '  float adrift=a+0.03*t+orbit;',
    '  float bent=r + k/max(r,0.0006);',
    '  float SCALE=22.0;',
    '  float smear=0.10/(abs(Rn-1.22)+0.07); smear=min(smear,0.6);',
    '  float sAcc=0.0;',
    '  for(int i=-1;i<=1;i++){',
    '    float aa=adrift+float(i)*0.5*smear;',
    '    vec2 s=vec2(cos(aa),sin(aa))*bent*SCALE + vec2(t*0.02,0.0);',
    '    sAcc+=starField(s,t);',
    '  }',
    '  sAcc/=3.0;',
    '  vec3 starCol=sAcc*vec3(0.82,0.90,1.0)*1.65;',
    '',
    '  // ---- domain-warped plasma swirl (organic galactic haze, spiraling inward) ----',
    '  float band=smoothstep(0.90,1.30,Rn)*smoothstep(3.30,1.45,Rn);',
    '  float spin=2.30*log(Rn+0.08) - t*0.50 + orbit*3.0;',
    '  vec2 q=rotm(spin)*(uvs/ringR);',
    '  vec2 warp=vec2( fbm3(q*1.4+vec2(0.0, t*0.08)), fbm3(q*1.4+vec2(4.0,-t*0.08)) );',
    '  float plasma=fbm(q*3.0 + warp*1.7 + vec2(t*0.05,0.0));',
    '  plasma=pow(max(plasma,0.0),1.7)*band;',
    '  vec3 pcol=plasmaColor(clamp(plasma*1.7,0.0,1.0));',
    '  vec3 plasmaCol=pcol*plasma*2.3*doppler;',
    '  plasmaCol=mix(plasmaCol, plasmaCol*vec3(0.82,0.80,1.18), smoothstep(2.0,3.2,Rn));',
    '',
    '  // ---- concentric wormhole-tunnel streaks flowing inward ----',
    '  float tunBand=smoothstep(0.93,1.18,Rn)*smoothstep(3.40,1.20,Rn);',
    '  float rings=0.5+0.5*sin(log(Rn+0.01)*9.0 - t*1.6);',
    '  rings=pow(rings,2.4);',
    '  float walls=0.5+0.5*sin(a*16.0 + log(Rn+0.01)*6.0 - t*0.7);',
    '  float tunnel=(rings*0.7 + rings*walls*0.45)*tunBand;',
    '  vec3 tunCol=mix(vec3(0.28,0.50,1.0), vec3(0.72,0.86,1.0), rings)*tunnel*0.55*(0.55+0.6*doppler);',
    '',
    '  // ---- photon ring shimmer hugging the circle (brighter, chromatic, doppler) ----',
    '  float shim=0.84+0.16*sin(a*9.0 - t*1.5)+0.10*sin(a*5.0 + t*0.9);',
    '  float prC=exp(-pow((Rn-1.000)/0.055,2.0));',
    '  float prR=exp(-pow((Rn-1.022)/0.058,2.0));',
    '  float prB=exp(-pow((Rn-0.982)/0.054,2.0));',
    '  // outer red fringe weighted down -> cooler, on-brand photon ring',
    '  vec3 prCol=vec3(0.70*prR,0.92*prC,1.0*prB)*2.5*shim*(0.72+0.40*doppler);',
    '',
    '  // inner lensed glow hugging the void',
    '  float innerGlow=exp(-pow((Rn-0.97)/0.18,2.0))*0.42;',
    '',
    '  // ---- diagonal light-jet with chromatic aberration (UR<->LL axis) ----',
    '  vec2 jdir=normalize(vec2(1.0,1.0));',
    '  float along=dot(uv,jdir);',
    '  float perp=dot(uv,vec2(-jdir.y,jdir.x));',
    '  float jw=0.010+0.02*abs(along);',
    '  float jenv=smoothstep(ringR*0.7,ringR*2.0,abs(along));',
    '  float ca=0.0026+0.009*abs(along);',
    '  float jrr=exp(-pow((perp+ca)/jw,2.0));',
    '  float jgg=exp(-pow((perp   )/jw,2.0));',
    '  float jbb=exp(-pow((perp-ca)/jw,2.0));',
    '  float jpulse=0.5+0.5*sin(abs(along)*22.0 - t*3.0);',
    '  float jamp=jenv*(0.32+0.68*jpulse);',
    '  // cool the chromatic fringe toward cyan/blue (no warm/orange cast, stays on-brand)',
    '  vec3 jetCol=vec3(jrr*0.58,jgg,jbb*1.06)*vec3(0.54,0.84,1.28)*jamp*0.5;',
    '',
    '  // ---- compose ----',
    '  vec3 col=vec3(0.0);',
    '  col+=starCol;',
    '  col+=plasmaCol;',
    '  col+=tunCol;',
    '  col+=prCol;',
    '  col+=vec3(0.5,0.75,1.0)*innerGlow;',
    '  col+=jetCol;',
    '',
    '  // event horizon void (single dominant ring => pure black inside)',
    '  float voidR=0.9;',
    '  float horizon=smoothstep(voidR-0.045,voidR+0.02,Rn);',
    '  col*=horizon;',
    '',
    '  // whisper of nebula + soft bloom halo',
    '  col+=vec3(0.02,0.03,0.06)*smoothstep(2.6,0.5,Rn)*0.5*horizon;',
    '  float halo=exp(-pow((Rn-1.12)/0.60,2.0))*0.22;',
    '  col+=vec3(0.2,0.4,0.9)*halo;',
    '',
    '  // vignette',
    '  col*=1.0-0.34*smoothstep(0.3,1.12,r);',
    '',
    '  // tonemap + gamma + gentle contrast + grain (NaN/negative guarded)',
    '  col=max(col,0.0);',
    '  col=vec3(1.0)-exp(-col*1.22);',
    '  col=pow(max(col,0.0),vec3(0.90));',
    '  col=clamp(col,0.0,1.0);',
    '  col=mix(col, col*col*(3.0-2.0*col), 0.12);',
    '  col+=(hash21(gl_FragCoord.xy+fract(t))-0.5)*0.022;',
    '',
    '  gl_FragColor=vec4(clamp(col,0.0,1.0),1.0);',
    '}'
  ].join('\n');

  var gl=null, prog=null, vbuf=null, uRes, uTime, uRing;

  function makeShader(g, type, src){
    var sh=g.createShader(type);
    if(!sh) return null;
    g.shaderSource(sh, src);
    g.compileShader(sh);
    if(!g.getShaderParameter(sh, g.COMPILE_STATUS)){
      try{ console.error('[14AO] shader compile failed:', g.getShaderInfoLog(sh)); }catch(e){}
      g.deleteShader(sh);
      return null;
    }
    return sh;
  }

  function initGL(){
    var opts={ alpha:false, antialias:false, depth:false, stencil:false,
               premultipliedAlpha:false, preserveDrawingBuffer:false,
               powerPreference:'high-performance', failIfMajorPerformanceCaveat:false };
    try{
      gl = canvas.getContext('webgl', opts) || canvas.getContext('experimental-webgl', opts);
    }catch(e){ gl=null; }
    if(!gl){ try{ console.warn('[14AO] WebGL unavailable, using 2D fallback'); }catch(e){} return false; }

    var vs=makeShader(gl, gl.VERTEX_SHADER, VERT);
    var fs=makeShader(gl, gl.FRAGMENT_SHADER, FRAG);
    if(!vs || !fs){ return false; }

    prog=gl.createProgram();
    if(!prog){ return false; }
    gl.attachShader(prog, vs); gl.attachShader(prog, fs);
    gl.bindAttribLocation(prog, 0, 'position');
    gl.linkProgram(prog);
    // shaders are owned by the program now; flag for deletion
    gl.deleteShader(vs); gl.deleteShader(fs);
    if(!gl.getProgramParameter(prog, gl.LINK_STATUS)){
      try{ console.error('[14AO] program link failed:', gl.getProgramInfoLog(prog)); }catch(e){}
      return false;
    }
    gl.useProgram(prog);

    vbuf=gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vbuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc=gl.getAttribLocation(prog,'position');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    uRes   = gl.getUniformLocation(prog,'u_res');
    uTime  = gl.getUniformLocation(prog,'u_time');
    uRing  = gl.getUniformLocation(prog,'u_ringR');

    gl.clearColor(0,0,0,1);
    return true;
  }

  function sizeGL(){
    if(canvas.width!==W)  canvas.width=W;
    if(canvas.height!==H) canvas.height=H;
    if(gl && !gl.isContextLost()){ gl.viewport(0,0,W,H); }
  }

  function drawGL(time){
    if(!gl || gl.isContextLost() || !prog) return;
    gl.uniform2f(uRes, W, H);
    gl.uniform1f(uTime, time);
    gl.uniform1f(uRing, ringR);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }

  // ====================================================================
  //  SPIRALING-INFALL PARTICLE LAYER (Canvas2D overlay, additive)
  //  glowing particles spiral inward, flash + recycle at the horizon;
  //  doppler-bright on one side; gentle disk inclination for depth.
  // ====================================================================
  var fxc=null, P=null, SPR=null;
  var INCL=0.90;  // disk inclination -> subtle 3D depth (kept near-circular so the O reads)

  function makeGlow(r,g,b){
    var s=64, oc=document.createElement('canvas'); oc.width=oc.height=s;
    var o=oc.getContext('2d'); if(!o) return oc;
    var grd=o.createRadialGradient(s/2,s/2,0, s/2,s/2,s/2);
    grd.addColorStop(0.00,'rgba('+r+','+g+','+b+',1)');
    grd.addColorStop(0.25,'rgba('+r+','+g+','+b+',0.5)');
    grd.addColorStop(0.60,'rgba('+r+','+g+','+b+',0.12)');
    grd.addColorStop(1.00,'rgba('+r+','+g+','+b+',0)');
    o.fillStyle=grd; o.fillRect(0,0,s,s);
    return oc;
  }

  function sizeFx(){
    if(!fx) return;
    var fw=Math.max(1,Math.round(vCW*dpr)), fh=Math.max(1,Math.round(vCH*dpr));
    if(fx.width!==fw)  fx.width=fw;
    if(fx.height!==fh) fx.height=fh;
    if(fxc){ fxc.setTransform(dpr,0,0,dpr,0,0); fxc.lineCap='round'; fxc.lineJoin='round'; }
  }

  function initFx(){
    if(!fx) return false;
    try{ fxc=fx.getContext('2d'); }catch(e){ fxc=null; }
    if(!fxc){ return false; }
    SPR=[ makeGlow(255,255,255), makeGlow(206,226,255), makeGlow(80,150,255), makeGlow(150,140,255) ];
    sizeFx();
    seedParticles();
    return true;
  }

  function resetP(p, seedSpread){
    p.a=Math.random()*TAU;
    p.r = seedSpread ? ringPx*(1.10+Math.random()*1.55) : ringPx*(2.15+Math.random()*0.50);
    p.spd=0.55+Math.random()*0.70;
    p.size=0.70+Math.random()*1.50;
    p.base=0.55+Math.random()*0.50;
    p.x=cxpx+Math.cos(p.a)*p.r;
    p.y=cypx+Math.sin(p.a)*p.r*INCL;
    p.px=p.x; p.py=p.y;
  }

  function seedParticles(){
    var n = reduce ? 50 : Math.round(clampN(Math.min(vCW,vCH)/12, 38, 66));
    P=[]; for(var i=0;i<n;i++){ var p={}; resetP(p,true); P.push(p); }
  }

  function drawParticles(time, dt, moving){
    if(!fxc || !P) return;
    fxc.clearRect(0,0,vCW,vCH);
    fxc.globalCompositeOperation='lighter';
    var R=ringPx, cx=cxpx, cy=cypx;
    var SPIN=0.55, INFLOW=R*0.30;
    for(var i=0;i<P.length;i++){
      var p=P[i];
      if(moving){
        var rn0=p.r/R;
        var om=p.spd*SPIN*(0.40+0.90*Math.pow(1.0/rn0,1.4));
        p.a+=om*dt;
        var inf=INFLOW*(0.30+Math.pow(1.0/rn0,1.7));
        p.r-=inf*dt;
      }
      // flash + recycle at the horizon
      if(p.r<=R*1.045){
        var fsz=R*0.13;
        fxc.globalAlpha=0.55;
        fxc.drawImage(SPR[0], p.x-fsz, p.y-fsz, fsz*2, fsz*2);
        resetP(p,false);
        continue;
      }
      p.px=p.x; p.py=p.y;
      p.x=cx+Math.cos(p.a)*p.r;
      p.y=cy+Math.sin(p.a)*p.r*INCL;

      var Rn=p.r/R;
      var nf=0.5+0.5*((p.y-cy)/(p.r*INCL+1e-3));          // 1 front(bottom) .. 0 back(top)
      var ang=Math.atan2(-(p.y-cy),(p.x-cx));             // y-up world angle
      var dopp=1.0+0.80*Math.cos(ang-(Math.PI+0.05*time));// brighter left side (matches shader)
      if(dopp<0.20) dopp=0.20; if(dopp>1.85) dopp=1.85;
      var heat=1.0+0.50*Math.max(0.0,(1.5-Rn));
      var ef=clamp01((2.65-Rn)/0.6)*clamp01((Rn-1.0)/0.07);
      var al=p.base*dopp*(0.40+0.60*nf)*heat*ef*0.50;
      if(al<=0.012) continue;
      if(al>0.92) al=0.92;
      var spr = Rn<1.35?SPR[0]:(Rn<1.85?SPR[1]:(Rn<2.40?SPR[2]:SPR[3]));
      var sz = p.size*R*0.05*(0.55+0.60*nf)*(1.0+heat*0.40);

      if(moving){
        fxc.globalAlpha=al*0.5;
        fxc.strokeStyle = Rn<1.6 ? 'rgba(210,228,255,1)' : 'rgba(110,165,255,1)';
        fxc.lineWidth=Math.max(0.6, sz*0.28);
        fxc.beginPath(); fxc.moveTo(p.px,p.py); fxc.lineTo(p.x,p.y); fxc.stroke();
      }
      fxc.globalAlpha=al;
      fxc.drawImage(spr, p.x-sz, p.y-sz, sz*2, sz*2);
    }
    fxc.globalAlpha=1;
    fxc.globalCompositeOperation='source-over';
  }

  // ====================================================================
  //  CANVAS-2D COSMOS FALLBACK (only if WebGL fails; SVG O stays on top)
  // ====================================================================
  var ctx=null, stars2d=null, fbGrad=null;

  // A canvas can hold only one context kind for its lifetime. If a WebGL
  // context was already created on it, getContext('2d') returns null, so we
  // swap in a fresh, context-free clone before taking the 2D path.
  function freshCanvas(){
    try{
      var old=canvas;
      var n=old.cloneNode(false);
      if(old.parentNode){ old.parentNode.replaceChild(n, old); }
      canvas=n;
    }catch(e){}
    gl=null; prog=null;
  }

  function initFallback(){
    try{ ctx = canvas.getContext('2d'); }catch(e){ ctx=null; }
    if(!ctx) return false;
    seedStars2d();
    return true;
  }
  function seedStars2d(){
    var n=Math.min(420, Math.round((W*H)/9000));
    if(!isFinite(n) || n<1) n=1;
    stars2d=[];
    for(var i=0;i<n;i++){
      stars2d.push({ x:Math.random(), y:Math.random(),
        r:Math.random()*1.5+0.2, p:Math.random()*6.28, s:0.4+Math.random()*1.6 });
    }
    // rebuild the (resolution-dependent) accretion gradient once per resize,
    // not every frame -> no per-frame allocation / GC churn in the fallback path
    fbGrad=null;
    if(ctx){
      var cx=W*0.5, cy=H*0.5, rad=ringR*H;
      if(rad>0 && isFinite(rad)){
        var g=ctx.createRadialGradient(cx,cy,rad*0.9, cx,cy,rad*2.6);
        g.addColorStop(0,'rgba(150,190,255,0.55)');
        g.addColorStop(0.18,'rgba(51,133,255,0.30)');
        g.addColorStop(1,'rgba(20,40,90,0)');
        fbGrad=g;
      }
    }
  }
  function drawFallback(time){
    if(!ctx) return;
    var cx=W*0.5, cy=H*0.5;
    var rad=ringR*H; // px ring radius (uv units * buffer height)
    if(!(rad>0) || !isFinite(rad)) rad=Math.min(W,H)*0.18;
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=1;
    ctx.fillStyle='#000005';
    ctx.fillRect(0,0,W,H);
    // stars with subtle radial lens pull
    if(stars2d){
      for(var i=0;i<stars2d.length;i++){
        var st=stars2d[i];
        var sx=st.x*W, sy=st.y*H;
        var dx=sx-cx, dy=sy-cy, dd=Math.sqrt(dx*dx+dy*dy)+0.001;
        var pull=1.0 - Math.min(0.55, (rad*rad*1.4)/(dd*dd));
        var px=cx+dx*pull, py=cy+dy*pull;
        if(dd < rad*0.92) continue; // hidden by void
        var tw = reduce ? 0.85 : (0.6+0.4*Math.sin(time*st.s+st.p));
        ctx.globalAlpha=tw;
        ctx.fillStyle='rgba(210,225,255,1)';
        ctx.beginPath(); ctx.arc(px,py,st.r,0,6.2832); ctx.fill();
      }
    }
    ctx.globalAlpha=1;
    // accretion + photon ring glow (cached gradient)
    ctx.globalCompositeOperation='lighter';
    if(fbGrad){
      ctx.fillStyle=fbGrad;
      ctx.beginPath(); ctx.arc(cx,cy,rad*2.6,0,6.2832); ctx.fill();
    }
    // bright photon ring
    ctx.lineWidth=Math.max(1.5,rad*0.05);
    ctx.strokeStyle='rgba(200,225,255,0.9)';
    ctx.beginPath(); ctx.arc(cx,cy,rad,0,6.2832); ctx.stroke();
    // doppler-bright highlight arc (one side noticeably brighter)
    ctx.lineWidth=Math.max(2,rad*0.07);
    ctx.strokeStyle='rgba(214,232,255,0.55)';
    ctx.beginPath(); ctx.arc(cx,cy,rad, Math.PI*0.62, Math.PI*1.38); ctx.stroke();
    ctx.globalCompositeOperation='source-over';
    // pure void
    ctx.fillStyle='#000005';
    ctx.beginPath(); ctx.arc(cx,cy,rad*0.9,0,6.2832); ctx.fill();
  }

  // ====================================================================
  //  DRIVER
  // ====================================================================
  var mode='gl';            // 'gl' | '2d'
  var last=(typeof performance!=='undefined'&&performance.now)?performance.now():Date.now();
  var clock=reduce?7.5:0, raf=0, started=false, dtLast=0;

  function now(){ return (typeof performance!=='undefined'&&performance.now)?performance.now():Date.now(); }

  function renderFrame(){
    sizeGL();
    if(mode==='gl') drawGL(clock); else drawFallback(clock);
    drawParticles(clock, reduce?0:dtLast, !reduce);
  }

  function loop(ts){
    raf=requestAnimationFrame(loop);
    if(typeof ts!=='number' || !isFinite(ts)) ts=now();  // guard non-finite timestamp
    var dt=(ts-last)/1000; last=ts;
    if(!(dt>=0)) dt=0;        // guard NaN / clock skew
    if(dt>0.1) dt=0.1;
    if(document.hidden){ return; }   // skip work while tab is hidden
    clock+=dt; dtLast=dt;
    renderFrame();
  }

  function startLoop(){
    if(raf || reduce) return;
    last=now();
    raf=requestAnimationFrame(loop);
  }
  function stopLoop(){
    if(raf){ cancelAnimationFrame(raf); raf=0; }
  }

  function onResize(){
    computeSize();
    if(mode==='2d') seedStars2d();
    if(fxc) seedParticles();
    renderFrame();
  }

  // ---- WebGL context loss / restore hardening ----
  function onCtxLost(e){
    if(e && e.preventDefault) e.preventDefault();   // required so 'restored' can fire
    stopLoop();
  }
  function onCtxRestored(){
    if(mode!=='gl') return;
    var ok=false;
    try{ ok=initGL(); }catch(err){ ok=false; }
    if(!ok){
      // give up on GL: drop to 2D on a clean canvas
      mode='2d';
      freshCanvas();
      if(!initFallback()){
        var stg=document.getElementById('stage'); if(stg) stg.style.background='#000005';
        return;
      }
    }
    sizeGL();
    if(reduce){ renderFrame(); } else { startLoop(); }
  }

  function start(){
    if(started) return; started=true;
    computeSize();
    initFx();   // particle overlay is independent of the GL/2D background

    // listen for context loss before we ever draw
    canvas.addEventListener('webglcontextlost', onCtxLost, false);
    canvas.addEventListener('webglcontextrestored', onCtxRestored, false);

    var ok=false;
    try{ ok=initGL(); }catch(e){ try{ console.error('[14AO] GL init error', e); }catch(_){} ok=false; }

    if(!ok){
      mode='2d';
      // if a GL context was obtained but setup failed, the canvas is "tainted"
      // for 2D; swap in a fresh one so getContext('2d') succeeds.
      if(gl){ freshCanvas(); }
      if(!initFallback()){
        var stg=document.getElementById('stage'); if(stg) stg.style.background='#000005';
      }
    }
    sizeGL();

    window.addEventListener('resize', onResize, {passive:true});
    window.addEventListener('orientationchange', onResize, {passive:true});

    document.addEventListener('visibilitychange', function(){
      if(!document.hidden){
        last=now();
        if(!reduce && !raf){ startLoop(); }
        else if(reduce){ renderFrame(); }   // repaint calm still frame on resume
      }
    });

    if(reduce){
      renderFrame();           // single calm still frame, no rAF loop
    }else{
      startLoop();
    }
  }

  // react to runtime change of reduced-motion preference
  function bindMQ(){
    var handler=function(e){
      reduce=!!e.matches;
      document.body.classList.toggle('reduced', reduce);
      if(reduce){
        stopLoop();
        clock=7.5; renderFrame();
      }else{
        last=now();
        startLoop();
      }
    };
    if(reduceMQ.addEventListener) reduceMQ.addEventListener('change', handler);
    else if(reduceMQ.addListener) reduceMQ.addListener(handler);
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', function(){ start(); bindMQ(); });
  }else{ start(); bindMQ(); }
})();
</script>
</body>
</html>
